<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Fun Pro - Learn ABCs</title>

<style>
  body {
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    margin: 0; padding: 15px; text-align: center; color: white; min-height: 100vh;
  }
  h1 { font-size: 2.2em; margin: 5px 0; }
  #stats { display: flex; justify-content: space-around; font-size: 1.2em; margin: 10px 0; }
  #stickers { font-size: 1.8em; min-height: 35px; }
  #prompt { font-size: 1.6em; margin: 15px 0; min-height: 80px; }
  #picture { font-size: 4em; margin: 5px 0; }

  .letter-btn {
    font-size: 3.5em; width: 28vw; height: 28vw; max-width: 110px; max-height: 110px;
    margin: 8px; border: none; border-radius: 20px; background: white;
    color: #333; box-shadow: 0 6px 0 #ccc; cursor: pointer;
  }
  .letter-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #ccc; }

  .controls { margin: 15px 0; }
  .toggle-btn, #parent-btn, #reset-btn, #music-btn {
    font-size: 1em; padding: 10px 15px; border-radius: 12px;
    border: none; background: #ffd700; color: #333; margin: 5px;
  }

  #parent-dashboard {
    display: none; background: rgba(0,0,0,0.3); padding: 15px;
    border-radius: 15px; margin-top: 15px; text-align: left;
  }

  .correct { animation: bounce 0.5s; background: #90EE90!important; }
  .wrong { animation: shake 0.5s; background: #FFB6C1!important; }

  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  /* Confetti */
  .confetti {
    position: fixed;
    width: 10px; height: 10px;
    background: yellow;
    animation: fall 1.5s linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Balloon rise animation */
  @keyframes rise {
    to { transform: translateY(-120vh); }
  }
</style>
</head>

<body>
  <h1>🌟 Alpha Fun Pro 🌟</h1>

  <!-- Background music (OFF by default) -->
  <audio id="bgm" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b6e1e7c1c.mp3?filename=kids-happy-tune-110624.mp3" loop></audio>

  <!-- Sound effects -->
  <audio id="sfx-correct" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_0a2e7b1.mp3?filename=correct-2-46134.mp3"></audio>
  <audio id="sfx-wrong" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_1b2e7b1.mp3?filename=wrong-2-46133.mp3"></audio>
  <audio id="sfx-fanfare" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6b2e7b1.mp3?filename=success-fanfare.mp3"></audio>

  <div id="stats">
    <div>Stickers: <span id="sticker-count">0</span></div>
    <div>Level: <span id="level-display">1</span></div>
  </div>

  <div id="stickers"></div>

  <!-- Progress bar -->
  <div id="progress-bar" style="
    width:80%; height:20px; background:#ffffff55; margin:10px auto;
    border-radius:10px; overflow:hidden;">
    <div id="progress-fill" style="
      width:0%; height:100%; background:#ffd700; transition:0.4s;"></div>
  </div>

  <div id="prompt">Tap Start to play!</div>
  <div id="picture"></div>
  <div id="letters"></div>

  <div class="controls">
    <button id="start-btn" class="toggle-btn" onclick="startGame()">Start Game</button>
    <button id="case-btn" class="toggle-btn" onclick="toggleCase()" style="display:none;">ABC / abc</button>
    <button id="music-btn" onclick="toggleMusic()">Music On/Off</button>
    <button id="parent-btn" onclick="toggleDashboard()">Parent Stats</button>
  </div>

  <div id="parent-dashboard">
    <h3>Parent Dashboard</h3>
    <div>Total correct: <span id="total-correct">0</span></div>
    <div>Most missed: <span id="most-missed">None yet</span></div>
    <div>Current mode: <span id="mode-display">Uppercase Names</span></div>
    <button id="reset-btn" onclick="resetProgress()">Reset Progress</button>
  </div>

  <!-- MINI-GAME OVERLAY -->
  <div id="minigame-overlay" style="
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.7); z-index:9999; text-align:center; padding-top:40px;
    color:white; font-size:2em;">
  </div>
